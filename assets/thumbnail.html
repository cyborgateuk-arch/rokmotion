<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }
  .canvas {
    width: 1280px;
    height: 720px;
    position: relative;
    background: linear-gradient(160deg, #faf6ee 0%, #e8dcc8 55%, #dfd0b8 100%);
    overflow: hidden;
  }
  .grain {
    position: absolute; inset: 0;
    opacity: 0.07;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  }
  .tape {
    position: absolute;
    width: 140px; height: 32px;
    background: rgba(255,220,120,0.82);
    border-radius: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
  }
  .tape-1 { top: 28px; left: 520px; transform: rotate(-4deg); }
  .tape-2 { bottom: 48px; right: 180px; transform: rotate(6deg); }

  .main-card {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -52%);
    width: 920px;
    background: #faf6ee;
    border: 2px solid #d9cdb8;
    border-radius: 10px;
    padding: 48px 56px 40px;
    box-shadow: 0 2px 0 #d9cdb8, 0 10px 30px rgba(45,41,38,0.15), 0 20px 50px rgba(45,41,38,0.08);
    text-align: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin-bottom: 28px;
  }

  .logo-paper {
    background: #fffef9;
    border: 2px solid #e8dcc8;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 4px 0 #d9cdb8, 0 8px 20px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-paper.left { transform: rotate(-5deg); }
  .logo-paper.right { transform: rotate(4deg); }

  /* Real X / Grok logo */
  .x-logo {
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
  }
  .x-logo svg { width: 44px; height: 44px; }

  /* Rokmotion logo mark */
  .rokmotion-mark {
    width: 52px; height: 52px;
    background: #0b84f3;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 800; color: white;
    font-family: 'Nunito', sans-serif;
  }

  .plus {
    font-size: 36px; color: #6b5e54; font-weight: 300;
  }

  /* Rokmotion wordmark */
  .rokmotion-logo {
    font-family: 'Patrick Hand', cursive;
    font-size: 88px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .rok { color: #e85d4c; }
  .motion { color: #2d2926; }

  .headline {
    font-family: 'Patrick Hand', cursive;
    font-size: 42px;
    color: #2d2926;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 24px;
    color: #6b5e54;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .badge {
    position: absolute;
    top: 36px; right: 48px;
    background: #3d7a5f;
    color: white;
    font-size: 20px;
    font-weight: 800;
    padding: 10px 22px;
    border-radius: 999px;
    transform: rotate(4deg);
    box-shadow: 0 4px 0 #2d5a45;
  }

  .emoji-deco {
    position: absolute;
    font-size: 40px;
  }
  .e1 { top: 80px; left: 60px; transform: rotate(-12deg); }
  .e2 { bottom: 70px; left: 90px; transform: rotate(8deg); }
  .e3 { top: 100px; right: 100px; transform: rotate(10deg); }

  .sticky {
    position: absolute;
    bottom: 56px; left: 56px;
    width: 200px;
    background: #fff9c4;
    padding: 16px 18px;
    font-family: 'Patrick Hand', cursive;
    font-size: 22px;
    color: #2d2926;
    transform: rotate(-7deg);
    box-shadow: 0 4px 0 #e6d56c, 0 8px 18px rgba(0,0,0,0.1);
    line-height: 1.3;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="grain"></div>
  <div class="tape tape-1"></div>
  <div class="tape tape-2"></div>
  <div class="badge">30 SEC DEMO</div>
  <div class="emoji-deco e1">📄</div>
  <div class="emoji-deco e2">✂️</div>
  <div class="emoji-deco e3">🎬</div>
  <div class="sticky">/rokmotion</div>

  <div class="main-card">
    <div class="rokmotion-logo" style="font-size: 108px; margin-bottom: 12px;">
      <span class="rok">Rok</span><span class="motion">motion</span>
    </div>
    <div class="headline">Videos from Code</div>
    <div class="sub">Type /rokmotion to create</div>
  </div>
</div>
</body>
</html>
